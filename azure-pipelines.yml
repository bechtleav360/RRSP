# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- master

pool:
  name: Signum
  demands:
    - msbuild
    - visualstudio


variables:
  solution: 'RRSP.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:

- checkout: self
  submodules: true  # This ensures that submodules are checked out
  clean: false

- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: Remove-Item -Path RRSP.Test.*\TestResults\* -Force -Recurse
  displayName: 'Clean TestResults Folder'
  
- script: dotnet restore RRSP.sln
  displayName: dotnet restore RRSP.sln

- task: IISWebAppManagementOnMachineGroup@0
  displayName: 'Create IIS Web Application'
  inputs:
    IISDeploymentType: IISWebApplication
    ParentWebsiteNameForApplication: 'Default Web Site'
    VirtualPathForApplication: /RRSP.Server
    PhysicalPathForApplication: '%SystemDrive%\inetpub\wwwroot\RRSP.Server'

- script: yarn install
  displayName: yarn install

- script: yarn build-development
  workingDirectory: ./RRSP.Server
  displayName: yarn build-production

- script: dotnet build --configuration $(buildConfiguration) --no-restore /p:IncrementalBuild=true /p:Deterministic=false /p:BuildInParallel=true /m
  displayName: dotnet build $(buildConfiguration) 

- script: dotnet test RRSP.Test.Environment/RRSP.Test.Environment.csproj --configuration $(buildConfiguration) --no-build --verbosity normal --logger trx
  env:
    ASPNETCORE_ENVIRONMENT: 'ci'
  displayName: dotnet test RRSP.Test.Environment

- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: 'RRSP.Test.Environment/TestResults/*.trx'
    failTaskOnFailureToPublishResults: true
    failTaskOnMissingResultsFile: true

# - script: dotnet test RRSP.Test.Logic/RRSP.Test.Logic.csproj --configuration $(buildConfiguration) --no-build --verbosity normal --logger trx
