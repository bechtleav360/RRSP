# Pre-deployment script to stop the application pool
- task: PowerShell@2
  displayName: 'Stop IIS Application Pool'
  inputs:
    targetType: 'inline'
    script: |
      Import-Module WebAdministration
      Stop-WebAppPool -Name "DefaultAppPool"

- script: dotnet publish .\RRSP.Server\ --configuration Release /p:EnvironmentName=ci --output C:\inetpub\wwwroot\RRSP.Server
  displayName: dotnet publish .\RRSP.Server\ --output C:\inetpub\wwwroot\RRSP.Server

- task: PowerShell@2
  displayName: 'Start IIS Application Pool'
  inputs:
    targetType: 'inline'
    script: |
      Import-Module WebAdministration
      Start-WebAppPool -Name "DefaultAppPool"

- script: dotnet test RRSP.Test.React/RRSP.Test.React.csproj --configuration $(buildConfiguration) --no-build --verbosity normal --logger trx
  env:
    ASPNETCORE_ENVIRONMENT: 'ci'
  displayName: dotnet test RRSP.Test.React

- task: PublishTestResults@2
  condition: always()
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: 'RRSP.Test.React/TestResults/*.trx'
    failTaskOnFailureToPublishResults: true
    failTaskOnMissingResultsFile: true